services:
  - type: web
    name: mats-and-mops
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mats-and-mops-db
          property: connectionString
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: UPLOAD_DIR
        value: uploads

databases:
  - name: mats-and-mops-db
    plan: free
    databaseName: mats_and_mops
